    // ─── LIVE SCORES ──────────────────────────────────────────────
    const LEAGUE = 'fifa.world';
    const ESPN = 'https://site.api.espn.com/apis/site/v2/sports/soccer';

    // ESPN fetch uses the ET/Americas date (not SAST), Jun 11–27 for group stage
    const GROUP_DATES_ET = [];
    for (let d = new Date('2026-06-11'); d <= new Date('2026-06-27'); d.setDate(d.getDate() + 1)) {
      GROUP_DATES_ET.push(d.toISOString().slice(0,10).replace(/-/g,''));
    }

    const KNOCKOUT_ROUNDS = {

      R16:   ['20260705','20260706','20260707','20260708'],
      QF:    ['20260710','20260711'],
      SF:    ['20260714','20260715'],
      THIRD: ['20260718'],
      FINAL: ['20260719'],
    };

    const DATE_TO_ROUND = {};
    GROUP_DATES_ET.forEach(d => DATE_TO_ROUND[d] = 'GROUP');
    Object.entries(KNOCKOUT_ROUNDS).forEach(([round, dates]) =>
      dates.forEach(d => DATE_TO_ROUND[d] = round)
    );

    const ROUND_BONUS = { R32: 10, R16: 15, QF: 20, SF: 25, THIRD: 30 };
    const FINALIST_BONUS = 35;
    const CHAMPION_BONUS = 50;

    const ESPN_MAP = {
      "Turkey": "Türkiye", "Turkiye": "Türkiye",
      "Ivory Coast": "Côte d'Ivoire", "Cote d'Ivoire": "Côte d'Ivoire", "Cote D'Ivoire": "Côte d'Ivoire",
      "United States": "USA", "United States of America": "USA",
      "Bosnia and Herzegovina": "Bosnia & Herz.", "Bosnia & Herzegovina": "Bosnia & Herz.",
      "Congo DR": "DR Congo", "Democratic Republic of Congo": "DR Congo",
      "Cape Verde": "Cabo Verde",
      "Curacao": "Curaçao",
      "Czech Republic": "Czechia",
      "Korea Republic": "South Korea", "Republic of Korea": "South Korea",
    };
    function norm(n) { return ESPN_MAP[n] || n; }
    function getToday() { return new Date().toISOString().slice(0,10).replace(/-/g,''); }

    async function fetchDate(dateStr) {
      const cacheKey = `wc26_${dateStr}`;
      const today = getToday();
      if (dateStr < today) {
        try { const c = localStorage.getItem(cacheKey); if (c) return JSON.parse(c); } catch(e) {}
      }
      try {
        const res = await fetch(`${ESPN}/${LEAGUE}/scoreboard?dates=${dateStr}`);
        if (!res.ok) return [];
        const data = await res.json();
        const results = [];
        for (const ev of (data.events || [])) {
          const comp = ev.competitions?.[0];
          if (!comp) continue;
          const completed = comp.status?.type?.completed;
          const inProgress = comp.status?.type?.state === 'in';
          if (!completed && !inProgress) continue;
          const [c1, c2] = comp.competitors || [];
          if (!c1 || !c2) continue;
          const team1 = norm(c1.team?.displayName || c1.team?.name || '');
          const team2 = norm(c2.team?.displayName || c2.team?.name || '');
          const score1 = completed ? parseInt(c1.score || '0') : null;
          const score2 = completed ? parseInt(c2.score || '0') : null;
          const round = DATE_TO_ROUND[dateStr] || 'GROUP';
          results.push({ dateStr, team1, team2, score1, score2, completed, round });
        }
        if (dateStr < today && results.length > 0) {
          try { localStorage.setItem(cacheKey, JSON.stringify(results)); } catch(e) {}
        }
        return results;
      } catch(e) { return []; }
    }

    async function fetchAllResults() {
      const today = getToday();
      const toFetch = [...GROUP_DATES_ET, ...Object.values(KNOCKOUT_ROUNDS).flat()].filter(d => d <= today);
      const all = [];
      for (const d of toFetch) { const r = await fetchDate(d); all.push(...r); }
      return all;
    }

    function calcTeamPoints(teamName, results) {
      let pts = 0;
      for (const r of results) {
        if (!r.completed) continue;
        const isT1 = r.team1 === teamName, isT2 = r.team2 === teamName;
        if (!isT1 && !isT2) continue;
        const mine = isT1 ? r.score1 : r.score2, opp = isT1 ? r.score2 : r.score1;
        if (r.round === 'GROUP') {
          if (mine > opp) pts += 3; else if (mine === opp) pts += 1;
        } else if (r.round === 'FINAL') {
          pts += mine > opp ? CHAMPION_BONUS : FINALIST_BONUS;
        } else {
          if (mine > opp) pts += 3 + (ROUND_BONUS[r.round] || 0);
        }
      }
      return pts;
    }

    function buildLeaderboard(results) {
      return familyDraw.map(member => {
        const teams = Object.keys(ROLES).map(role => {
          const team = member[role];
          return { role, team, pts: calcTeamPoints(team, results) };
        });
        return { name: member.name, total: teams.reduce((s,t)=>s+t.pts,0), teams };
      }).sort((a,b) => b.total - a.total || a.name.localeCompare(b.name));
    }

          {hasStake && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              <div style={{ display:"flex", flexWrap:"wrap", gap:4, justifyContent:"flex-end" }}>{t1.map(m=><Chip key={m.name+m.role} name={m.name} role={m.role}/>)}</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>{t2.map(m=><Chip key={m.name+m.role} name={m.name} role={m.role}/>)}</div>
            </div>
          )}
          {both.length>0 && <div style={{ marginTop:8, textAlign:"center", color:"#f59e0b", fontSize:11, fontStyle:"italic" }}>⚠️ Split allegiance: {both.join(", ")}</div>}
        </div>
      );
    }

    const MEDALS=["🥇","🥈","🥉"];

    function LeaderboardRow({ entry, rank, expanded, onToggle }) {
      const medal=MEDALS[rank]||null;
      return (
        <div style={{ marginBottom:8 }}>
          <div onClick={onToggle} style={{ background:rank===0?"#1a2e1a":rank===1?"#1a251a":rank===2?"#1a201a":"#0f172a", border:`1px solid ${rank===0?"#16a34a55":rank===1?"#71717a55":rank===2?"#92400e55":"#1e3a5f"}`, borderRadius:expanded?"12px 12px 0 0":12, padding:"12px 14px", display:"grid", gridTemplateColumns:"32px 1fr auto", alignItems:"center", gap:10, cursor:"pointer" }}>
            <div style={{ textAlign:"center", fontSize:medal?20:13, fontWeight:700, color:"#64748b" }}>{medal||`${rank+1}`}</div>
            <div style={{ fontWeight:700, fontSize:15, color:"#f1f5f9" }}>{entry.name}</div>
            <div style={{ fontWeight:900, fontSize:22, color:rank===0?"#4ade80":rank===1?"#94a3b8":rank===2?"#fb923c":"#60A5FA" }}>
              {entry.total}<span style={{ fontSize:11, fontWeight:400, color:"#475569", marginLeft:3 }}>pts</span>
            </div>
          </div>
          {expanded && (
            <div style={{ background:"#080f1e", border:"1px solid #1e3a5f", borderTop:"none", borderRadius:"0 0 12px 12px", padding:"10px 14px" }}>
              {entry.teams.map(t=>{
                const {color,icon}=ROLES[t.role];
                return (
                  <div key={t.team} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom:"1px solid #0f172a" }}>
                    <span style={{ display:"flex", alignItems:"center", gap:6, fontSize:12 }}>
                      <span style={{ color, fontSize:14 }}>{icon}</span>
                      <span style={{ color:"#94a3b8" }}>{t.team}</span>
                      <span style={{ color:"#475569", fontSize:10 }}>{t.role}</span>
                    </span>
                    <span style={{ fontWeight:700, color, fontSize:14 }}>{t.pts} pts</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function Leaderboard() {
      const [results,setResults]=useState([]);
      const [loading,setLoading]=useState(false);
      const [lastUpdated,setLastUpdated]=useState(null);
      const [error,setError]=useState(null);
      const [expanded,setExpanded]=useState(null);
      const [showGuide,setShowGuide]=useState(false);

      const loadScores=useCallback(async()=>{
        setLoading(true); setError(null);
        try {
          const r=await fetchAllResults();
          setResults(r);
          setLastUpdated(new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'}));
        } catch(e) { setError("Couldn't load scores. Check your connection."); }
        setLoading(false);
      },[]);

      useEffect(()=>{ loadScores(); const t=setInterval(loadScores,5*60*1000); return ()=>clearInterval(t); },[loadScores]);

      const leaderboard=useMemo(()=>buildLeaderboard(results),[results]);
      const gamesPlayed=results.filter(r=>r.completed).length;

      return (
        <div style={{ padding:"12px 16px 48px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:11, color:"#475569" }}>{loading?"⏳ Fetching scores…":lastUpdated?`Updated ${lastUpdated} · ${gamesPlayed} games played`:"Not yet loaded"}</div>
            <button onClick={loadScores} disabled={loading} style={{ padding:"5px 12px", borderRadius:6, fontSize:12, fontWeight:600, background:loading?"#0f172a":"#1e3a5f", color:loading?"#475569":"#60A5FA", border:"1px solid #1e3a5f" }}>{loading?"Loading…":"↻ Refresh"}</button>
          </div>

          {error && <div style={{ background:"#1a1010", border:"1px solid #7f1d1d", borderRadius:8, padding:"10px 14px", marginBottom:12, color:"#fca5a5", fontSize:12 }}>{error}</div>}

          <div style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:10, marginBottom:14, overflow:"hidden" }}>
            <button onClick={()=>setShowGuide(g=>!g)} style={{ width:"100%", padding:"10px 14px", display:"flex", justifyContent:"space-between", color:"#64748b", fontSize:12, fontWeight:600 }}>
              <span>📋 Scoring guide</span><span>{showGuide?"▲":"▼"}</span>
            </button>
            {showGuide && (
              <div style={{ padding:"0 14px 12px", borderTop:"1px solid #1e293b" }}>
                {[["Group win","+3 pts"],["Group draw","+1 pt"],["Round of 32 win","+3 + 10 bonus"],["Round of 16 win","+3 + 15 bonus"],["Quarter-final win","+3 + 20 bonus"],["Semi-final win","+3 + 25 bonus"],["3rd place win","+3 + 30 bonus"],["Runner-up","+35 bonus"],["🏆 Champion","+50 bonus"]].map(([l,p])=>(
                  <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", fontSize:12, borderBottom:"1px solid #0f172a", color:"#94a3b8" }}>
                    <span>{l}</span><span style={{ color:"#FBBF24", fontWeight:700 }}>{p}</span>
                  </div>
                ))}
                <div style={{ marginTop:8, fontSize:11, color:"#475569", fontStyle:"italic" }}>Each member's total = sum of all 4 teams' points</div>
              </div>
            )}
          </div>

          {!loading && gamesPlayed===0 && (
            <div style={{ textAlign:"center", padding:"40px 20px", color:"#475569" }}>
              <div style={{ fontSize:40, marginBottom:12 }}>⏳</div>
              <div style={{ fontSize:15, fontWeight:600, color:"#64748b", marginBottom:6 }}>Tournament hasn't started yet</div>
              <div style={{ fontSize:12 }}>First kick-off: 11 June at 21:00 SAST</div>
              <div style={{ fontSize:12, marginTop:4 }}>Mexico 🆚 South Africa — Group A</div>
            </div>
          )}

          {gamesPlayed>0 && leaderboard.map((entry,i)=>(
            <LeaderboardRow key={entry.name} entry={entry} rank={i} expanded={expanded===entry.name} onToggle={()=>setExpanded(expanded===entry.name?null:entry.name)} />
          ))}
        </div>
      );
    }

    function App() {
      const [tab,setTab]=useState("schedule");
      const [selectedDate,setSelectedDate]=useState("All");
      const [selectedMember,setSelectedMember]=useState(null);

      const memberTeams=useMemo(()=>{
        if (!selectedMember) return null;
        const m=familyDraw.find(x=>x.name===selectedMember);
        return new Set(Object.keys(ROLES).map(role=>m[role]));
      },[selectedMember]);

      const filtered=useMemo(()=>{
        let f=fixtures;
        if (selectedDate!=="All") f=f.filter(x=>x.date===selectedDate);
        if (memberTeams) f=f.filter(x=>memberTeams.has(x.team1)||memberTeams.has(x.team2));
        return f;
      },[selectedDate,memberTeams]);

      const withStake=filtered.filter(f=>(teamLookup[f.team1]||[]).length>0||(teamLookup[f.team2]||[]).length>0).length;
      const btnBase={borderRadius:99,fontSize:12,fontWeight:600,border:"1px solid"};
      const tabBase={borderRadius:6,fontSize:12,fontWeight:600,border:"1px solid",whiteSpace:"nowrap"};

      return (
        <div style={{ minHeight:"100vh", background:"#020817" }}>
          <div style={{ background:"linear-gradient(135deg,#0a1628 0%,#0f2351 100%)", borderBottom:"1px solid #1e3a5f", padding:"20px 20px 14px", textAlign:"center" }}>
            <div style={{ fontSize:26, marginBottom:3 }}>🏆</div>
            <h1 style={{ margin:0, fontSize:21, fontWeight:900, letterSpacing:1, color:"#f1f5f9" }}>Family World Cup 2026</h1>
            <p style={{ margin:"3px 0 8px", color:"#64748b", fontSize:12 }}>27 members · 72 group matches · Times in SAST</p>
            <span style={{ display:"inline-block", marginBottom:6, padding:"2px 8px", borderRadius:99, background:"#1e293b", border:"1px solid #334155", color:"#475569", fontSize:10, fontWeight:700, letterSpacing:1 }}>V5</span>
            <div style={{ display:"flex", justifyContent:"center", gap:14, fontSize:11, color:"#64748b" }}>
              <span>⚽ Evening</span><span>🌙 Late night</span><span>🌅 Morning</span>
            </div>
          </div>

          <div style={{ display:"flex", borderBottom:"1px solid #1e293b", background:"#080f1e" }}>
            {["schedule","leaderboard"].map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{ flex:1, padding:"12px 0", fontSize:13, fontWeight:700, color:tab===t?"#f1f5f9":"#475569", borderBottom:tab===t?"2px solid #FBBF24":"2px solid transparent", textTransform:"capitalize", letterSpacing:0.5 }}>
                {t==="schedule"?"📅 Schedule":"🏅 Leaderboard"}
              </button>
            ))}
          </div>

          {tab==="schedule" && (
            <div style={{ display:"flex", justifyContent:"center", flexWrap:"wrap", gap:10, padding:"10px 16px", borderBottom:"1px solid #111827", background:"#080f1e" }}>
              {Object.entries(ROLES).map(([role,{color,icon}])=>(
                <span key={role} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color }}>{icon} {role}</span>
              ))}
            </div>
          )}

          {tab==="schedule" && (
            <>
              <div style={{ padding:"12px 16px 0", borderBottom:"1px solid #111827" }}>
                <div style={{ fontSize:11, color:"#475569", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Filter by member</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:6, paddingBottom:12 }}>
                  <button onClick={()=>setSelectedMember(null)} style={{ ...btnBase, padding:"4px 10px", background:!selectedMember?"#2563eb":"transparent", color:!selectedMember?"#fff":"#64748b", borderColor:!selectedMember?"#2563eb":"#1e293b" }}>All</button>
                  {allNames.map(name=>(
                    <button key={name} onClick={()=>setSelectedMember(selectedMember===name?null:name)} style={{ ...btnBase, padding:"4px 10px", background:selectedMember===name?"#2563eb":"transparent", color:selectedMember===name?"#fff":"#94a3b8", borderColor:selectedMember===name?"#2563eb":"#1e293b" }}>{name}</button>
                  ))}
                </div>
              </div>
              <div style={{ overflowX:"auto", borderBottom:"1px solid #111827", background:"#080f1e" }}>
                <div style={{ display:"flex", padding:"8px 16px", gap:6, minWidth:"max-content" }}>
                  <button onClick={()=>setSelectedDate("All")} style={{ ...tabBase, padding:"5px 12px", background:selectedDate==="All"?"#FBBF24":"transparent", color:selectedDate==="All"?"#000":"#64748b", borderColor:selectedDate==="All"?"#FBBF24":"#1e293b" }}>All Dates</button>
                  {allDates.map(d=>(
                    <button key={d} onClick={()=>setSelectedDate(d)} style={{ ...tabBase, padding:"5px 12px", background:selectedDate===d?"#FBBF24":"transparent", color:selectedDate===d?"#000":"#64748b", borderColor:selectedDate===d?"#FBBF24":"#1e293b" }}>{d}</button>
                  ))}
                </div>
              </div>
              <div style={{ padding:"9px 16px", borderBottom:"1px solid #0f172a", fontSize:11, color:"#475569" }}>
                {filtered.length} matches · {withStake} with family stakes
                {selectedMember&&` · ${selectedMember}: ${[...memberTeams].join(", ")}`}
              </div>
              <div style={{ padding:"12px 16px 48px" }}>
                {filtered.length===0?<div style={{ textAlign:"center", color:"#475569", padding:48 }}>No matches found</div>:filtered.map((f,i)=><FixtureCard key={i} fixture={f}/>)}
              </div>
            </>
          )}

          {tab==="leaderboard" && <Leaderboard/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
