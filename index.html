    function norm(n) { return ESPN_MAP[n] || n; }
    function getToday() { return new Date().toISOString().slice(0,10).replace(/-/g,''); }

    // Resilient JSON fetch: try ESPN directly, then fall back through CORS proxies.
    // Throws if every attempt fails, so callers can distinguish "fetch failed"
    // from "fetched fine but no games yet".
    const PROXIES = [
      (url) => url, // direct first — works if ESPN sends CORS headers
      (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
      (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    ];

    async function fetchJSON(url) {
      let lastErr = null;
      for (const wrap of PROXIES) {
        try {
          const res = await fetch(wrap(url));
          if (!res.ok) { lastErr = new Error(`HTTP ${res.status}`); continue; }
          return await res.json();
        } catch (e) {
          lastErr = e;
          continue;
        }
      }
      throw lastErr || new Error('All fetch attempts failed');
    }

    async function fetchDate(dateStr, includeScheduled) {
      const cacheKey = `wc26_${dateStr}`;
      const today = getToday();
      // Only cache fully-past dates (completed) to avoid caching scheduled/live states
      if (dateStr < today) {
        try { const c = localStorage.getItem(cacheKey); if (c) return JSON.parse(c); } catch(e) {}
      }
      // Note: no try/catch here — if fetchJSON throws (network/CORS/proxy all failed),
      // the error propagates up so the UI can show a real error instead of a
      // misleading "no games yet" empty state.
      const data = await fetchJSON(`${ESPN}/${LEAGUE}/scoreboard?dates=${dateStr}`);
      const results = [];
      for (const ev of (data.events || [])) {
        const comp = ev.competitions?.[0];
        if (!comp) continue;
        const state = comp.status?.type?.state; // 'pre' | 'in' | 'post'
        const completed = comp.status?.type?.completed;
        const inProgress = state === 'in';
        if (!completed && !inProgress && !includeScheduled) continue;
        const [c1, c2] = comp.competitors || [];
        if (!c1 || !c2) continue;
        const team1 = norm(c1.team?.displayName || c1.team?.name || '');
        const team2 = norm(c2.team?.displayName || c2.team?.name || '');
        const score1 = (completed || inProgress) ? parseInt(c1.score || '0') : null;
        const score2 = (completed || inProgress) ? parseInt(c2.score || '0') : null;
        const adv1 = c1.advance === true || c1.winner === true;
        const adv2 = c2.advance === true || c2.winner === true;
        const winner = completed ? (adv1 ? team1 : adv2 ? team2 : (score1>score2?team1:score2>score1?team2:null)) : null;
        const round = DATE_TO_ROUND[dateStr] || 'GROUP';
        const statusDetail = comp.status?.type?.shortDetail || '';
        results.push({ dateStr, team1, team2, score1, score2, completed, inProgress, state, winner, round, statusDetail });
      }
      if (dateStr < today && results.length > 0) {
        try { localStorage.setItem(cacheKey, JSON.stringify(results)); } catch(e) {}
      }
      return results;
    }

      const all = [];
      let anyFailed = false, anySucceeded = false;
      for (const d of toFetch) {
        try { const r = await fetchDate(d); all.push(...r); anySucceeded = true; }
        catch(e) { anyFailed = true; }
      }
      // If every single fetch failed, signal a hard error rather than "no games"
      if (anyFailed && !anySucceeded) {
        const err = new Error('FETCH_FAILED');
        err.code = 'FETCH_FAILED';
        throw err;
      }
      return all;
    }

    // Knockout fetch — includes scheduled games so the bracket shows matchups before kickoff
    async function fetchKnockout() {
      const today = getToday();
      const out = {};
      for (const [round, dates] of Object.entries(KNOCKOUT_ROUNDS)) {
        const matches = [];
        for (const d of dates) {
          // fetch dates up to and including today; include scheduled for upcoming
          if (d > today) {
            const r = await fetchDate(d, true);
            matches.push(...r);
          } else {
            const r = await fetchDate(d, true);
            matches.push(...r);
          }
        }
        out[round] = matches;
      }
      return out;
    }

    function buildGroupStandings(results) {
      // Build team membership per group from our fixture list
      const groupTeams = {};
      fixtures.forEach(f => {
        if (!groupTeams[f.group]) groupTeams[f.group] = new Set();
        groupTeams[f.group].add(f.team1);
        groupTeams[f.group].add(f.team2);
      });
      const completed = results.filter(r => r.completed && r.round === 'GROUP');
      if (completed.length === 0) return null;
      return Object.entries(groupTeams)
        .sort(([a],[b]) => a.localeCompare(b))
        .map(([group, teamSet]) => {
          const teams = [...teamSet].map(team => {
            let w=0,d=0,l=0,gf=0,ga=0;
            completed.forEach(r => {
              const isT1=r.team1===team, isT2=r.team2===team;
              if (!isT1&&!isT2) return;
              const myG=isT1?r.score1:r.score2, opG=isT1?r.score2:r.score1;
              gf+=myG; ga+=opG;
              if (myG>opG) w++; else if (myG===opG) d++; else l++;
            });
            return { name:team, played:w+d+l, wins:w, draws:d, losses:l, gf, ga, gd:gf-ga, pts:w*3+d };
          }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
          return { name:`Group ${group}`, teams };
        });
    }

    function calcTeamPoints(teamName, results) {
      let pts = 0;
      for (const r of results) {
        if (!r.completed) continue;
        const isT1 = r.team1 === teamName, isT2 = r.team2 === teamName;
        if (!isT1 && !isT2) continue;
        const mine = isT1 ? r.score1 : r.score2, opp = isT1 ? r.score2 : r.score1;
        if (r.round === 'GROUP') {
          if (mine > opp) pts += 3; else if (mine === opp) pts += 1;
        } else if (r.round === 'FINAL') {
          pts += mine > opp ? CHAMPION_BONUS : FINALIST_BONUS;
        } else {
          if (mine > opp) pts += 3 + (ROUND_BONUS[r.round] || 0);
        }
      }
      return pts;
    }

    function buildLeaderboard(results) {
      return familyDraw.map(member => {
        const teams = Object.keys(ROLES).map(role => {
          const team = member[role];
          return { role, team, pts: calcTeamPoints(team, results) };
        });
        return { name: member.name, total: teams.reduce((s,t)=>s+t.pts,0), teams };
      }).sort((a,b) => b.total - a.total || a.name.localeCompare(b.name));
    }

    function timeIcon(t) { const h=parseInt(t); return h<7?"🌙":h<12?"🌅":"⚽"; }

    const MEDALS=["🥇","🥈","🥉"];

    function LeaderboardRow({ entry, rank, expanded, onToggle }) {

      return (

    function Leaderboard() {
      const [results,setResults]=useState([]);

        setLoading(true); setError(null);

              <div style={{ fontSize:12 }}>Scores populate automatically as matches finish.</div>

          {gamesPlayed>0 && leaderboard.map((entry,i)=>(

    // ─── STANDINGS COMPONENTS ────────────────────────────────────
    function GroupCard({ group }) {
      return (
        <div style={{ background:"#0f172a", border:"1px solid #1e3a5f", borderRadius:10, overflow:"hidden" }}>
          <div style={{ padding:"7px 10px", background:"#1e293b", borderBottom:"1px solid #1e3a5f" }}>

                <span style={{ color:team.gd>0?"#34D399":team.gd<0?"#f87171":"#64748b", fontSize:11, textAlign:"center" }}>{team.gd>0?`+${team.gd}`:team.gd}</span>
                <span style={{ color:qualified?"#34D399":"#f1f5f9", fontSize:12, fontWeight:700, textAlign:"center" }}>{team.pts}</span>

    function Standings() {
      const [groups,setGroups]=useState(null);
      const [loading,setLoading]=useState(false);
      const [lastUpdated,setLastUpdated]=useState(null);
      const [error,setError]=useState(null);
      const [gamesProcessed,setGamesProcessed]=useState(0);

      const load=useCallback(async()=>{
        setLoading(true); setError(null);
        try {
          const results = await fetchAllResults();
          const g = buildGroupStandings(results);
          const completed = results.filter(r=>r.completed).length;
          setGamesProcessed(completed);
          if (g) { setGroups(g); setLastUpdated(new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})); }
          else setGroups(null);
        } catch(e) { setError("Couldn't load standings. Check your connection."); }
        setLoading(false);
      },[]);

      useEffect(()=>{ load(); },[load]);

      return (
        <div style={{ padding:"12px 16px 48px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:11, color:"#475569" }}>{loading?"⏳ Loading standings…":lastUpdated?`Updated ${lastUpdated} · ${gamesProcessed} results in`:"Not yet loaded"}</div>
            <button onClick={load} disabled={loading} style={{ padding:"5px 12px", borderRadius:6, fontSize:12, fontWeight:600, background:loading?"#0f172a":"#1e3a5f", color:loading?"#475569":"#60A5FA", border:"1px solid #1e3a5f" }}>{loading?"Loading…":"↻ Refresh"}</button>
          </div>

            <span style={{ borderLeft:"3px solid #34D399", paddingLeft:5, color:"#34D399" }}>Qualifying (top 2)</span>

          </div>
          {error&&<div style={{ background:"#1a1010", border:"1px solid #7f1d1d", borderRadius:8, padding:"10px 14px", marginBottom:12, color:"#fca5a5", fontSize:12 }}>{error}</div>}
          {!loading&&!groups&&!error&&(
            <div style={{ textAlign:"center", padding:"40px 20px", color:"#475569" }}>
              <div style={{ fontSize:36, marginBottom:10 }}>🌍</div>
              <div style={{ fontSize:14, fontWeight:600, color:"#64748b", marginBottom:4 }}>Waiting for results to come in</div>
              <div style={{ fontSize:12, marginBottom:4 }}>Standings build automatically as games complete</div>

          {groups&&(

    // ─── BRACKET COMPONENTS ──────────────────────────────────────
    const ROUND_LABELS = {
      R32:   { title:"Round of 32",  short:"R32" },
      R16:   { title:"Round of 16",  short:"R16" },
      QF:    { title:"Quarter-finals", short:"QF" },
      SF:    { title:"Semi-finals",  short:"SF" },
      THIRD: { title:"Third-place playoff", short:"3rd" },
      FINAL: { title:"Final",        short:"Final" },
    };

    function familyFor(team) {
      return teamLookup[team] || [];
    }

    // Format ESPN's YYYYMMDD into "Sun 28 Jun". ESPN's dates are the ET kickoff
    // date; knockout games kick off afternoon/evening ET = same-or-next-day SAST.
    // We display the ET match date here, which matches how ESPN groups the fixtures.
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const WEEKDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    function fmtDate(yyyymmdd) {
      if (!yyyymmdd || yyyymmdd.length !== 8) return "";
      const y = +yyyymmdd.slice(0,4), mo = +yyyymmdd.slice(4,6)-1, d = +yyyymmdd.slice(6,8);
      const dt = new Date(Date.UTC(y, mo, d));
      return `${WEEKDAYS[dt.getUTCDay()]} ${d} ${MONTHS[mo]}`;
    }

    function BracketMatch({ m }) {
      const fam1 = familyFor(m.team1), fam2 = familyFor(m.team2);
      const live = m.inProgress;
      const done = m.completed;
      const w1 = done && m.winner === m.team1;
      const w2 = done && m.winner === m.team2;

      const TeamRow = ({ team, score, won, fam }) => (
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:6, padding:"5px 8px", background: won?"#16331f":"transparent", borderRadius:6 }}>
          <div style={{ display:"flex", alignItems:"center", gap:5, minWidth:0 }}>
            <span style={{ color: won?"#4ade80":done?"#64748b":"#f1f5f9", fontSize:12, fontWeight: won?700:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{team || "TBD"}</span>
            {won && <span style={{ fontSize:10 }}>✓</span>}
            {fam.length>0 && <span style={{ display:"flex", gap:2 }}>{fam.map(f=>(<span key={f.name+f.role} title={`${f.name} · ${f.role}`} style={{ fontSize:9 }}>{ROLES[f.role].icon}</span>))}</span>}
          </div>
          {(score!==null&&score!==undefined) && <span style={{ color: won?"#4ade80":"#94a3b8", fontSize:13, fontWeight:700, flexShrink:0 }}>{score}</span>}
        </div>
      );

      return (
        <div style={{ background:"#0f172a", border:`1px solid ${live?"#FBBF24":"#1e3a5f"}`, borderRadius:10, padding:4, position:"relative" }}>
          {live && <span style={{ position:"absolute", top:-7, right:8, background:"#FBBF24", color:"#000", fontSize:8, fontWeight:800, padding:"1px 5px", borderRadius:99, letterSpacing:0.5 }}>● LIVE</span>}
          {m.dateStr && <div style={{ textAlign:"center", color:"#475569", fontSize:9, fontWeight:600, letterSpacing:0.3, padding:"1px 0 3px" }}>{fmtDate(m.dateStr)}</div>}
          <TeamRow team={m.team1} score={m.score1} won={w1} fam={fam1} />
          <div style={{ height:1, background:"#1e293b", margin:"1px 8px" }} />
          <TeamRow team={m.team2} score={m.score2} won={w2} fam={fam2} />
          {(m.statusDetail && !done) && <div style={{ textAlign:"center", color:"#475569", fontSize:9, padding:"2px 0 1px" }}>{m.statusDetail}</div>}
        </div>
      );
    }

    function RoundColumn({ round, matches }) {
      const label = ROUND_LABELS[round];
      return (
        <div style={{ marginBottom:18 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <span style={{ color:"#FBBF24", fontWeight:800, fontSize:13, letterSpacing:0.5 }}>{label.title}</span>
            <span style={{ flex:1, height:1, background:"#1e293b" }} />
            <span style={{ color:"#475569", fontSize:10 }}>{matches.length} {matches.length===1?"match":"matches"}</span>
          </div>
          {matches.length===0
            ? <div style={{ color:"#334155", fontSize:11, fontStyle:"italic", padding:"6px 2px" }}>Not yet scheduled</div>
            : <div style={{ display:"grid", gridTemplateColumns: round==="FINAL"||round==="THIRD"||round==="SF" ? "1fr" : "repeat(2,1fr)", gap:8 }}>
                {matches.map((m,i)=><BracketMatch key={i} m={m} />)}
              </div>
          }
        </div>
      );

    function Bracket() {
      const [rounds,setRounds]=useState(null);
      const [loading,setLoading]=useState(false);
      const [lastUpdated,setLastUpdated]=useState(null);
      const [error,setError]=useState(null);

      const load=useCallback(async()=>{
        setLoading(true); setError(null);
        try {
          const r=await fetchKnockout();
          setRounds(r);
          setLastUpdated(new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'}));
        } catch(e) { setError("Couldn't load the bracket. Check your connection."); }
        setLoading(false);
      },[]);

      useEffect(()=>{ load(); const t=setInterval(load,5*60*1000); return ()=>clearInterval(t); },[load]);

      const order=["R32","R16","QF","SF","THIRD","FINAL"];
      const totalMatches = rounds ? order.reduce((s,r)=>s+(rounds[r]?.length||0),0) : 0;
      // Family members still alive: any team in a non-completed or winning position in the latest round
      const aliveTeams = useMemo(()=>{
        if (!rounds) return new Set();
        const alive = new Set();
        order.forEach(r=>{
          (rounds[r]||[]).forEach(m=>{
            if (m.completed) { if (m.winner) alive.add(m.winner); }
            else { if (m.team1) alive.add(m.team1); if (m.team2) alive.add(m.team2); }
          });
        });
        return alive;
      },[rounds]);

      return (
        <div style={{ padding:"12px 16px 48px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:11, color:"#475569" }}>{loading?"⏳ Loading bracket…":lastUpdated?`Updated ${lastUpdated} · ${totalMatches} ties`:"Not yet loaded"}</div>
            <button onClick={load} disabled={loading} style={{ padding:"5px 12px", borderRadius:6, fontSize:12, fontWeight:600, background:loading?"#0f172a":"#1e3a5f", color:loading?"#475569":"#60A5FA", border:"1px solid #1e3a5f" }}>{loading?"Loading…":"↻ Refresh"}</button>
          </div>
          <div style={{ marginBottom:14, fontSize:10, color:"#475569", display:"flex", flexWrap:"wrap", gap:10 }}>
            <span>✓ = advanced</span>
            {Object.entries(ROLES).map(([role,{icon}])=><span key={role}>{icon} {role}</span>)}
          </div>
          {error&&<div style={{ background:"#1a1010", border:"1px solid #7f1d1d", borderRadius:8, padding:"10px 14px", marginBottom:12, color:"#fca5a5", fontSize:12 }}>{error}</div>}
          {!loading && totalMatches===0 && !error && (
            <div style={{ textAlign:"center", padding:"40px 20px", color:"#475569" }}>
              <div style={{ fontSize:36, marginBottom:10 }}>🗺️</div>
              <div style={{ fontSize:14, fontWeight:600, color:"#64748b", marginBottom:4 }}>The knockout bracket appears here</div>
              <div style={{ fontSize:12 }}>Round of 32 kicks off 28 June</div>
            </div>
          )}
          {rounds && totalMatches>0 && order.map(r=>(
            (rounds[r] && rounds[r].length>0)
              ? <RoundColumn key={r} round={r} matches={rounds[r]} />
              : null
          ))}
        </div>
      );
    }

    function App() {
      const [tab,setTab]=useState("schedule");
      const [selectedDate,setSelectedDate]=useState("All");
      const [selectedMember,setSelectedMember]=useState(null);

      const memberTeams=useMemo(()=>{
        if (!selectedMember) return null;
        const m=familyDraw.find(x=>x.name===selectedMember);
        return new Set(Object.keys(ROLES).map(role=>m[role]));
      },[selectedMember]);

      const filtered=useMemo(()=>{
        let f=fixtures;
        if (selectedDate!=="All") f=f.filter(x=>x.date===selectedDate);
        if (memberTeams) f=f.filter(x=>memberTeams.has(x.team1)||memberTeams.has(x.team2));
        return f;
      },[selectedDate,memberTeams]);

      const withStake=filtered.filter(f=>(teamLookup[f.team1]||[]).length>0||(teamLookup[f.team2]||[]).length>0).length;
      const btnBase={borderRadius:99,fontSize:12,fontWeight:600,border:"1px solid"};
      const tabBase={borderRadius:6,fontSize:12,fontWeight:600,border:"1px solid",whiteSpace:"nowrap"};

      return (
        <div style={{ minHeight:"100vh", background:"#020817" }}>
          <div style={{ position:"relative", background:"linear-gradient(135deg,#0a1628 0%,#0f2351 100%)", borderBottom:"1px solid #1e3a5f", padding:"20px 20px 14px", textAlign:"center" }}>
            <span style={{ position:"absolute", top:10, right:12, padding:"2px 8px", borderRadius:99, background:"#1e293b", border:"1px solid #334155", color:"#475569", fontSize:10, fontWeight:700, letterSpacing:1 }}>V10</span>
            <div style={{ fontSize:26, marginBottom:3 }}>🏆</div>
            <h1 style={{ margin:0, fontSize:21, fontWeight:900, letterSpacing:1, color:"#f1f5f9" }}>Family World Cup 2026</h1>
            <p style={{ margin:"3px 0 8px", color:"#64748b", fontSize:12 }}>27 members · 72 group matches · Times in SAST</p>
            <div style={{ display:"flex", justifyContent:"center", gap:14, fontSize:11, color:"#64748b" }}>
              <span>⚽ Evening</span><span>🌙 Late night</span><span>🌅 Morning</span>
            </div>
          </div>

          <div style={{ display:"flex", borderBottom:"1px solid #1e293b", background:"#080f1e" }}>
            {["schedule","leaderboard","standings","bracket"].map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{ flex:1, padding:"11px 0", fontSize:11, fontWeight:700, color:tab===t?"#f1f5f9":"#475569", borderBottom:tab===t?"2px solid #FBBF24":"2px solid transparent", letterSpacing:0.2 }}>
                {t==="schedule"?"📅 Schedule":t==="leaderboard"?"🏅 Family":t==="standings"?"🌍 Groups":"🗺️ Knock Out Tree"}
              </button>
            ))}
          </div>

          {tab==="schedule" && (
            <div style={{ display:"flex", justifyContent:"center", flexWrap:"wrap", gap:10, padding:"10px 16px", borderBottom:"1px solid #111827", background:"#080f1e" }}>
              {Object.entries(ROLES).map(([role,{color,icon}])=>(
                <span key={role} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color }}>{icon} {role}</span>
              ))}
            </div>
          )}

          {tab==="schedule" && (
            <>
              <div style={{ padding:"12px 16px 0", borderBottom:"1px solid #111827" }}>
                <div style={{ fontSize:11, color:"#475569", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Filter by member</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:6, paddingBottom:12 }}>
                  <button onClick={()=>setSelectedMember(null)} style={{ ...btnBase, padding:"4px 10px", background:!selectedMember?"#2563eb":"transparent", color:!selectedMember?"#fff":"#64748b", borderColor:!selectedMember?"#2563eb":"#1e293b" }}>All</button>
                  {allNames.map(name=>(
                    <button key={name} onClick={()=>setSelectedMember(selectedMember===name?null:name)} style={{ ...btnBase, padding:"4px 10px", background:selectedMember===name?"#2563eb":"transparent", color:selectedMember===name?"#fff":"#94a3b8", borderColor:selectedMember===name?"#2563eb":"#1e293b" }}>{name}</button>
                  ))}
                </div>
              </div>
              <div style={{ overflowX:"auto", borderBottom:"1px solid #111827", background:"#080f1e" }}>
                <div style={{ display:"flex", padding:"8px 16px", gap:6, minWidth:"max-content" }}>
                  <button onClick={()=>setSelectedDate("All")} style={{ ...tabBase, padding:"5px 12px", background:selectedDate==="All"?"#FBBF24":"transparent", color:selectedDate==="All"?"#000":"#64748b", borderColor:selectedDate==="All"?"#FBBF24":"#1e293b" }}>All Dates</button>
                  {allDates.map(d=>(
                    <button key={d} onClick={()=>setSelectedDate(d)} style={{ ...tabBase, padding:"5px 12px", background:selectedDate===d?"#FBBF24":"transparent", color:selectedDate===d?"#000":"#64748b", borderColor:selectedDate===d?"#FBBF24":"#1e293b" }}>{d}</button>
                  ))}
                </div>
              </div>
              <div style={{ padding:"9px 16px", borderBottom:"1px solid #0f172a", fontSize:11, color:"#475569" }}>
                {filtered.length} matches · {withStake} with family stakes
                {selectedMember&&` · ${selectedMember}: ${[...memberTeams].join(", ")}`}
              </div>
              <div style={{ padding:"12px 16px 48px" }}>
                {filtered.length===0
                  ? <div style={{ textAlign:"center", color:"#475569", padding:48 }}>No matches found</div>
                  : <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8 }}>
                      {filtered.map((f,i)=><FixtureCard key={i} fixture={f}/>)}
                    </div>
                }
              </div>
            </>
          )}

          {tab==="leaderboard" && <Leaderboard/>}
          {tab==="standings" && <Standings/>}
          {tab==="bracket" && <Bracket/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
